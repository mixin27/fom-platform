name: app_ui_kit
description: Reusable UI kit package with app themes and design tokens.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito/Nunito-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Nunito/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito/Nunito-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Nunito/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito/Nunito-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Nunito/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito/Nunito-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Nunito/Nunito-Black.ttf
          weight: 900
        - asset: assets/fonts/Nunito/Nunito-BlackItalic.ttf
          weight: 900
          style: italic
    - family: NotoSansMyanmar
      fonts:
        - asset: assets/fonts/NotoSansMyanmar/NotoSansMyanmar-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansMyanmar/NotoSansMyanmar-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansMyanmar/NotoSansMyanmar-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansMyanmar/NotoSansMyanmar-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansMyanmar/NotoSansMyanmar-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/NotoSansMyanmar/NotoSansMyanmar-Black.ttf
          weight: 900
